<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>ZdorovLife</title>
  <meta
    name="theme-color"
    content="#f7f5f2"
  />
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-bg"></div>

  <main class="mobile-root" id="mobile-root">
    <section class="welcome-screen" id="welcome-screen" aria-label="Welcome screen">
      <div class="welcome-card glass">
        <div class="welcome-logo" aria-hidden="true">🧠</div>
        <p class="welcome-kicker">LIFE SIMULATOR</p>
        <h1 class="welcome-title">ZdorovLife</h1>
        <p class="welcome-subtitle">
          Цель: прожить 7 дней и достичь баланса жизни. Каждое решение влияет на здоровье, сон, стресс, воду и энергию.
        </p>
        <button class="start-btn" id="welcome-start-btn" type="button">Начать</button>
      </div>
    </section>

    <section class="game-screen" id="game-screen" aria-label="Game screen">
      <div class="game-shell">
        <header class="game-hud" aria-label="HUD показатели">
          <div class="hud-topline">
            <p class="hud-run-title">ZdorovLife · <span id="balance-stage">Normal</span></p>
            <span class="balance-chip is-normal" id="balance-chip" title="Life Balance">
              <span class="balance-icon" aria-hidden="true">⚖️</span>
              <span class="balance-value" id="balance-value">60</span>
            </span>
            <span class="mini-chip" id="scene-step">Day 1 of 7 · Morning</span>
          </div>

          <div class="hud-row">
            <article class="hud-stat">
              <div class="hud-head">
                <span class="hud-icon">❤️</span>
                <span class="hud-label">Здоровье</span>
                <span class="hud-value" id="health-value">65</span>
              </div>
              <div class="hud-track good"><div class="hud-fill" id="health-bar" style="width: 65%"></div></div>
              <span class="stat-delta" id="health-delta"></span>
            </article>

            <article class="hud-stat">
              <div class="hud-head">
                <span class="hud-icon">⚡</span>
                <span class="hud-label">Энергия</span>
                <span class="hud-value" id="energy-value">60</span>
              </div>
              <div class="hud-track energy"><div class="hud-fill" id="energy-bar" style="width: 60%"></div></div>
              <span class="stat-delta" id="energy-delta"></span>
            </article>

            <article class="hud-stat">
              <div class="hud-head">
                <span class="hud-icon">😰</span>
                <span class="hud-label">Стресс</span>
                <span class="hud-value" id="stress-value">35</span>
              </div>
              <div class="hud-track stress"><div class="hud-fill" id="stress-bar" style="width: 35%"></div></div>
              <span class="stat-delta" id="stress-delta"></span>
            </article>

            <article class="hud-stat">
              <div class="hud-head">
                <span class="hud-icon">💧</span>
                <span class="hud-label">Вода</span>
                <span class="hud-value" id="hydration-value">55</span>
              </div>
              <div class="hud-track hydration"><div class="hud-fill" id="hydration-bar" style="width: 55%"></div></div>
              <span class="stat-delta" id="hydration-delta"></span>
            </article>

            <article class="hud-stat">
              <div class="hud-head">
                <span class="hud-icon">🛌</span>
                <span class="hud-label">Сон</span>
                <span class="hud-value" id="sleep-value">60</span>
              </div>
              <div class="hud-track sleep"><div class="hud-fill" id="sleep-bar" style="width: 60%"></div></div>
              <span class="stat-delta" id="sleep-delta"></span>
            </article>
          </div>
        </header>

        <section class="scene-stage" id="character-stage">
          <div id="character" class="character state-neutral" role="img" aria-label="Состояние персонажа">
            <img
              id="character-image"
              class="character-image"
              src="/assets/assets/characters/character-neutral.png"
              alt="Состояние персонажа: Нейтральное"
            />
          </div>
          <p class="character-state" id="character-state-text">Состояние: Нейтральное</p>
          <section class="action-panel" aria-label="Панель выбора">
            <div class="card-header">
              <h2 id="scene-title">Сценарий дня</h2>
            </div>
            <div id="scene" class="scene-content"></div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
